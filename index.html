<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة الطائر</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    touch-action: manipulation;
  }
  #gameCanvas {
    background: linear-gradient(#5ec8e8, #bdeee0);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 40px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #highscore {
    position: absolute;
    top: 68px;
    left: 0;
    right: 0;
    text-align: center;
    color: #ffe680;
    font-family: Arial, sans-serif;
    font-size: 18px;
    font-weight: bold;
    text-shadow: 1px 1px 3px rgba(0,0,0,0.6);
    pointer-events: none;
  }
  #message {
    position: absolute;
    top: 45%;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 24px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    pointer-events: none;
  }
  #shareBtn {
    position: absolute;
    top: 58%;
    left: 0;
    right: 0;
    text-align: center;
    display: none;
  }
  #shareBtn button {
    background: #25d366;
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 25px;
    font-size: 16px;
    font-family: Arial, sans-serif;
    font-weight: bold;
    box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">0</div>
<div id="highscore">أعلى نتيجة: 0</div>
<div id="message">اضغط في أي مكان للطيران</div>
<div id="shareBtn"><button onclick="shareScore(event)">📤 شارك نتيجتك</button></div>

<script>
// نظام الصوت باستخدام Web Audio API (أضمن على الموبايل)
let audioCtx = null;
let soundBuffers = {};
let audioReady = false;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();

  const files = { flap: 'flap.mp3', hit: 'hit.mp3', point: 'point.mp3' };
  const names = Object.keys(files);
  let loaded = 0;

  names.forEach(function(name) {
    fetch(files[name])
      .then(function(res) {
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.arrayBuffer();
      })
      .then(function(buf) {
        return audioCtx.decodeAudioData(buf);
      })
      .then(function(decoded) {
        soundBuffers[name] = decoded;
        loaded++;
        if (loaded === names.length) audioReady = true;
      })
      .catch(function(err) {
        console.log('فشل تحميل الصوت: ' + name, err);
      });
  });
}

function playSound(name) {
  if (!audioCtx || !soundBuffers[name]) return;
  if (audioCtx.state === 'suspended') audioCtx.resume();
  const source = audioCtx.createBufferSource();
  source.buffer = soundBuffers[name];
  source.connect(audioCtx.destination);
  source.start(0);
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('ui');
const messageEl = document.getElementById('message');
const highscoreEl = document.getElementById('highscore');
const shareBtnEl = document.getElementById('shareBtn');

let highScore = 0;
try {
  highScore = parseInt(localStorage.getItem('flappyHighScore')) || 0;
} catch(e) {}
highscoreEl.textContent = 'أعلى نتيجة: ' + highScore;

// حجم الشاشة يتناسب مع الموبايل
function resize() {
  canvas.width = Math.min(window.innerWidth, 500);
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// إعدادات الطائر
let bird = {
  x: 80,
  y: canvas.height / 2,
  radius: 15,
  velocity: 0,
  gravity: 0.5,
  jump: -8.5
};

let pipes = [];
let pipeWidth = 60;
let pipeGap = 170;
let basePipeSpeed = 2.5;
let pipeSpeed = basePipeSpeed;
let maxPipeSpeed = 5.5;
let score = 0;
let gameStarted = false;
let gameOver = false;
let frame = 0;
let wingAngle = 0;
let wingBoost = 0;
let groundHeight = 70;
let groundOffset = 0;
let shakeAmount = 0;
let particles = [];

let clouds = [];
for (let i = 0; i < 5; i++) {
  clouds.push({
    x: Math.random() * 500,
    y: 40 + Math.random() * 150,
    scale: 0.6 + Math.random() * 0.8,
    speed: 0.2 + Math.random() * 0.3
  });
}

function shareScore(e) {
  e.stopPropagation();
  const text = 'لعبت لعبة الطائر وسجّلت ' + score + ' نقطة! جرّب تنافسني: https://awadahmad556677-debug.github.io/flappy-game/';
  if (navigator.share) {
    navigator.share({ text: text }).catch(function() {});
  } else {
    window.open('https://wa.me/?text=' + encodeURIComponent(text), '_blank');
  }
}

function resetGame() {
  bird.y = canvas.height / 2;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  frame = 0;
  pipeSpeed = basePipeSpeed;
  gameOver = false;
  gameStarted = false;
  scoreEl.textContent = '0';
  messageEl.textContent = 'اضغط في أي مكان للطيران';
  messageEl.style.display = 'block';
  shareBtnEl.style.display = 'none';
}

function flap() {
  if (!audioCtx) {
    try {
      initAudio();
    } catch(e) {}
  } else if (audioCtx.state === 'suspended') {
    audioCtx.resume();
  }
  if (gameOver) {
    resetGame();
    return;
  }
  if (!gameStarted) {
    gameStarted = true;
    messageEl.style.display = 'none';
  }
  bird.velocity = bird.jump;
  wingBoost = 1;
  playSound('flap');
}

// التحكم باللمس (موبايل) والماوس (كمبيوتر)
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  flap();
}, { passive: false });

canvas.addEventListener('mousedown', flap);

function spawnParticles(x, y) {
  for (let i = 0; i < 8; i++) {
    particles.push({
      x: x,
      y: y,
      vx: (Math.random() - 0.5) * 4,
      vy: -Math.random() * 3 - 1,
      life: 1,
      color: Math.random() > 0.5 ? '#ffd700' : '#fff9c4'
    });
  }
}

function createPipe() {
  let topHeight = Math.random() * (canvas.height - groundHeight - pipeGap - 150) + 50;
  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: topHeight + pipeGap,
    passed: false
  });
}

function update() {
  // رفرفة الجناح بتفضل شغالة حتى قبل بداية اللعب
  wingAngle += 0.3 + wingBoost * 0.5;
  if (wingBoost > 0) wingBoost -= 0.08;
  if (wingBoost < 0) wingBoost = 0;

  // تحريك السحاب دايمًا (حتى قبل بداية اللعب)
  clouds.forEach(function(c) {
    c.x -= c.speed;
    if (c.x < -80) c.x = canvas.width + 80;
  });

  // تلاشي الاهتزاز
  if (shakeAmount > 0) shakeAmount *= 0.85;
  if (shakeAmount < 0.2) shakeAmount = 0;

  // تحديث الجزيئات (النجوم)
  for (let i = particles.length - 1; i >= 0; i--) {
    let p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += 0.1;
    p.life -= 0.03;
    if (p.life <= 0) particles.splice(i, 1);
  }

  if (!gameStarted || gameOver) return;

  frame++;

  // تحريك الأرض
  groundOffset -= pipeSpeed;
  if (groundOffset <= -40) groundOffset = 0;

  // حركة الطائر
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // إنشاء أعمدة جديدة كل فترة
  if (frame % 90 === 0) {
    createPipe();
  }

  // تحريك الأعمدة
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= pipeSpeed;

    // احتساب النقاط
    if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
      pipes[i].passed = true;
      score++;
      scoreEl.textContent = score;
      playSound('point');
      spawnParticles(bird.x, bird.y);

      // زيادة الصعوبة تدريجيًا كل 5 نقاط
      pipeSpeed = Math.min(basePipeSpeed + Math.floor(score / 5) * 0.4, maxPipeSpeed);
    }

    // إزالة الأعمدة اللي خرجت من الشاشة
    if (pipes[i].x + pipeWidth < 0) {
      pipes.splice(i, 1);
    }
  }

  // تصادم مع الأرض أو السقف
  if (bird.y + bird.radius > canvas.height - groundHeight || bird.y - bird.radius < 0) {
    endGame();
  }

  // تصادم مع الأعمدة
  for (let pipe of pipes) {
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipeWidth &&
      (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
    ) {
      endGame();
    }
  }
}

function endGame() {
  gameOver = true;
  playSound('hit');
  shakeAmount = 10;

  let newRecord = false;
  if (score > highScore) {
    highScore = score;
    newRecord = true;
    try {
      localStorage.setItem('flappyHighScore', highScore);
    } catch(e) {}
    highscoreEl.textContent = 'أعلى نتيجة: ' + highScore;
  }

  if (newRecord) {
    messageEl.textContent = 'رقم قياسي جديد! 🎉 نقاطك: ' + score + ' — اضغط للمحاولة تاني';
  } else {
    messageEl.textContent = 'خسرت! نقاطك: ' + score + ' — اضغط للمحاولة تاني';
  }
  messageEl.style.display = 'block';
  shareBtnEl.style.display = 'block';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (shakeAmount > 0) {
    ctx.translate(
      (Math.random() - 0.5) * shakeAmount,
      (Math.random() - 0.5) * shakeAmount
    );
  }

  // السحاب
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  clouds.forEach(function(c) {
    ctx.save();
    ctx.translate(c.x, c.y);
    ctx.scale(c.scale, c.scale);
    ctx.beginPath();
    ctx.arc(0, 0, 20, 0, Math.PI * 2);
    ctx.arc(18, -8, 14, 0, Math.PI * 2);
    ctx.arc(-18, -6, 14, 0, Math.PI * 2);
    ctx.arc(0, -14, 16, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });

  // رسم الأعمدة
  for (let pipe of pipes) {
    let grad = ctx.createLinearGradient(pipe.x, 0, pipe.x + pipeWidth, 0);
    grad.addColorStop(0, '#3fae5c');
    grad.addColorStop(0.5, '#5fd97e');
    grad.addColorStop(1, '#3fae5c');
    ctx.fillStyle = grad;
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height - pipe.bottom);
    // حواف الأعمدة
    ctx.fillStyle = '#2d8f47';
    ctx.fillRect(pipe.x - 4, pipe.top - 22, pipeWidth + 8, 22);
    ctx.fillRect(pipe.x - 4, pipe.bottom, pipeWidth + 8, 22);
    // خط لمعة خفيف
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.fillRect(pipe.x + 6, 0, 6, pipe.top);
    ctx.fillRect(pipe.x + 6, pipe.bottom, 6, canvas.height - pipe.bottom);
  }

  // الأرض
  let groundY = canvas.height - groundHeight;
  ctx.fillStyle = '#ded17a';
  ctx.fillRect(0, groundY, canvas.width, groundHeight);
  ctx.fillStyle = '#c9b968';
  for (let gx = groundOffset; gx < canvas.width + 40; gx += 40) {
    ctx.fillRect(gx, groundY, 20, 10);
  }
  ctx.fillStyle = '#8bc34a';
  ctx.fillRect(0, groundY, canvas.width, 8);

  // رسم الطائر
  ctx.save();
  ctx.translate(bird.x, bird.y);
  let rotation = Math.min(Math.max(bird.velocity / 10, -0.5), 0.5);
  ctx.rotate(rotation);
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
  ctx.fill();
  // عين الطائر
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(8, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // جناح الطائر (متحرك)
  let flapWing = Math.sin(wingAngle) * (0.5 + wingBoost);
  ctx.fillStyle = '#d4a017';
  ctx.beginPath();
  ctx.ellipse(-3, 2, bird.radius * 0.75, bird.radius * 0.4, flapWing * 0.9, 0, Math.PI * 2);
  ctx.fill();
  // منقار
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(bird.radius - 2, 0);
  ctx.lineTo(bird.radius + 10, -3);
  ctx.lineTo(bird.radius + 10, 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();

  // النجوم (جزيئات السكور)
  particles.forEach(function(p) {
    ctx.globalAlpha = Math.max(p.life, 0);
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x, p.y, 3, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  });

  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
