<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>لعبة الطائر</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4ec0ca">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #1a1a2e;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    overflow: hidden;
    touch-action: manipulation;
  }
  #gameCanvas {
    background: linear-gradient(#4ec0ca, #a8e6cf);
    display: block;
    max-width: 100vw;
    max-height: 100vh;
  }
  #ui {
    position: absolute;
    top: 20px;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 40px;
    font-weight: bold;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
    pointer-events: none;
  }
  #message {
    position: absolute;
    top: 45%;
    left: 0;
    right: 0;
    text-align: center;
    color: white;
    font-family: Arial, sans-serif;
    font-size: 24px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.7);
    pointer-events: none;
  }
</style>
</head>
<body>
<canvas id="gameCanvas"></canvas>
<div id="ui">0</div>
<div id="message">اضغط في أي مكان للطيران</div>

<audio id="flapSound" src="flap.mp3" preload="auto"></audio>
<audio id="hitSound" src="Hit.mp3" preload="auto"></audio>
<audio id="pointSound" src="Point.mp3" preload="auto"></audio>

<script>
const flapSound = document.getElementById('flapSound');
const hitSound = document.getElementById('hitSound');
const pointSound = document.getElementById('pointSound');

function playSound(sound) {
  try {
    sound.currentTime = 0;
  } catch(e) {}
  sound.play().catch(function(err) {
    alert('خطأ صوت: ' + err.name + ' - ' + err.message);
  });
}

const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('ui');
const messageEl = document.getElementById('message');

// حجم الشاشة يتناسب مع الموبايل
function resize() {
  canvas.width = Math.min(window.innerWidth, 500);
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener('resize', resize);

// إعدادات الطائر
let bird = {
  x: 80,
  y: canvas.height / 2,
  radius: 15,
  velocity: 0,
  gravity: 0.5,
  jump: -8.5
};

let pipes = [];
let pipeWidth = 60;
let pipeGap = 170;
let pipeSpeed = 2.5;
let score = 0;
let gameStarted = false;
let gameOver = false;
let frame = 0;

function resetGame() {
  bird.y = canvas.height / 2;
  bird.velocity = 0;
  pipes = [];
  score = 0;
  frame = 0;
  gameOver = false;
  gameStarted = false;
  scoreEl.textContent = '0';
  messageEl.textContent = 'اضغط في أي مكان للطيران';
  messageEl.style.display = 'block';
}

function flap() {
  if (gameOver) {
    resetGame();
    return;
  }
  if (!gameStarted) {
    gameStarted = true;
    messageEl.style.display = 'none';
  }
  bird.velocity = bird.jump;
  playSound(flapSound);
}

// التحكم باللمس (موبايل) والماوس (كمبيوتر)
canvas.addEventListener('touchstart', function(e) {
  e.preventDefault();
  flap();
}, { passive: false });

canvas.addEventListener('mousedown', flap);

function createPipe() {
  let topHeight = Math.random() * (canvas.height - pipeGap - 150) + 50;
  pipes.push({
    x: canvas.width,
    top: topHeight,
    bottom: topHeight + pipeGap,
    passed: false
  });
}

function update() {
  if (!gameStarted || gameOver) return;

  frame++;

  // حركة الطائر
  bird.velocity += bird.gravity;
  bird.y += bird.velocity;

  // إنشاء أعمدة جديدة كل فترة
  if (frame % 90 === 0) {
    createPipe();
  }

  // تحريك الأعمدة
  for (let i = pipes.length - 1; i >= 0; i--) {
    pipes[i].x -= pipeSpeed;

    // احتساب النقاط
    if (!pipes[i].passed && pipes[i].x + pipeWidth < bird.x) {
      pipes[i].passed = true;
      score++;
      scoreEl.textContent = score;
      playSound(pointSound);
    }

    // إزالة الأعمدة اللي خرجت من الشاشة
    if (pipes[i].x + pipeWidth < 0) {
      pipes.splice(i, 1);
    }
  }

  // تصادم مع الأرض أو السقف
  if (bird.y + bird.radius > canvas.height || bird.y - bird.radius < 0) {
    endGame();
  }

  // تصادم مع الأعمدة
  for (let pipe of pipes) {
    if (
      bird.x + bird.radius > pipe.x &&
      bird.x - bird.radius < pipe.x + pipeWidth &&
      (bird.y - bird.radius < pipe.top || bird.y + bird.radius > pipe.bottom)
    ) {
      endGame();
    }
  }
}

function endGame() {
  gameOver = true;
  playSound(hitSound);
  messageEl.textContent = 'خسرت! نقاطك: ' + score + ' — اضغط للمحاولة تاني';
  messageEl.style.display = 'block';
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  // رسم الأعمدة
  ctx.fillStyle = '#2ecc71';
  for (let pipe of pipes) {
    ctx.fillRect(pipe.x, 0, pipeWidth, pipe.top);
    ctx.fillRect(pipe.x, pipe.bottom, pipeWidth, canvas.height - pipe.bottom);
    // حواف الأعمدة
    ctx.fillStyle = '#27ae60';
    ctx.fillRect(pipe.x - 3, pipe.top - 20, pipeWidth + 6, 20);
    ctx.fillRect(pipe.x - 3, pipe.bottom, pipeWidth + 6, 20);
    ctx.fillStyle = '#2ecc71';
  }

  // رسم الطائر
  ctx.save();
  ctx.translate(bird.x, bird.y);
  let rotation = Math.min(Math.max(bird.velocity / 10, -0.5), 0.5);
  ctx.rotate(rotation);
  ctx.fillStyle = '#f1c40f';
  ctx.beginPath();
  ctx.arc(0, 0, bird.radius, 0, Math.PI * 2);
  ctx.fill();
  // عين الطائر
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(6, -4, 5, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(8, -4, 2.5, 0, Math.PI * 2);
  ctx.fill();
  // منقار
  ctx.fillStyle = '#e67e22';
  ctx.beginPath();
  ctx.moveTo(bird.radius - 2, 0);
  ctx.lineTo(bird.radius + 10, -3);
  ctx.lineTo(bird.radius + 10, 3);
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('sw.js').catch(function(err) {
      console.log('Service worker registration failed:', err);
    });
  });
}
</script>
</body>
</html>
